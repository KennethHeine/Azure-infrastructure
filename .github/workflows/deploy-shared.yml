name: Deploy Shared Infrastructure

on:
  workflow_dispatch:

  # Auto-deploy when the shared infra changes on main.
  push:
    branches: [main]
    paths:
      - 'shared/**'
      - '.github/workflows/deploy-shared.yml'

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-shared
  LOCATION: norwayeast

jobs:
  deploy:
    name: Deploy shared ACR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy shared infrastructure
        shell: bash
        run: |
          set -euo pipefail
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --only-show-errors >/dev/null

          DEPLOYMENT_NAME="shared-${GITHUB_RUN_ID}"
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --template-file shared/main.bicep \
            --only-show-errors

          ACR_NAME=$(az deployment group show -g "$RESOURCE_GROUP" -n "$DEPLOYMENT_NAME" --query properties.outputs.acrName.value -o tsv)
          ACR_LOGIN_SERVER=$(az deployment group show -g "$RESOURCE_GROUP" -n "$DEPLOYMENT_NAME" --query properties.outputs.acrLoginServer.value -o tsv)

          # Allow ARM-audience tokens so Container Apps managed identities can pull
          # images from this registry (Microsoft-recommended for MI-based pulls).
          # Best-effort: tolerate older CLIs where the sub-command differs.
          az acr config authentication-as-arm update -r "$ACR_NAME" --status enabled --only-show-errors \
            || echo "::warning::Could not set authentication-as-arm; verify ARM token auth is enabled on $ACR_NAME"

          echo "### Shared ACR deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Name: \`$ACR_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Login server: \`$ACR_LOGIN_SERVER\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resource group: \`$RESOURCE_GROUP\`" >> "$GITHUB_STEP_SUMMARY"
