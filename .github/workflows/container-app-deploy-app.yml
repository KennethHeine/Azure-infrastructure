name: Container App — Deploy App (reusable)

# Reusable app-deploy workflow for every container-app repo. Builds the app image
# (and any extra images, e.g. a sidecar/runner image) with Docker on the GitHub
# runner and pushes to the repo's own ACR. (It used to cloud-build with
# `az acr build`, but ACR Tasks' shared agent pool can suffer regional outages
# that leave every build Queued indefinitely — e.g. Sweden Central, 2026-06-17 —
# so the build now runs on the runner and no longer depends on that pool.) Then it
# points the Container App at the freshly built image, and finally prunes stale
# images from the repo's ACR (see the cleanup job below — it never deletes images
# still in use).
#
# Thin caller (app image only):
#   jobs:
#     deploy:
#       uses: KennethHeine/Azure-infrastructure/.github/workflows/container-app-deploy-app.yml@main
#       secrets: inherit
#
# Caller that also builds extra images (each built as a separate parallel job):
#   jobs:
#     deploy:
#       uses: KennethHeine/Azure-infrastructure/.github/workflows/container-app-deploy-app.yml@main
#       secrets: inherit
#       with:
#         extra_images: '[{"suffix":"-runner","dockerfile":"runner/Dockerfile","context":"."}]'
#
# extra_images is a JSON array; for each entry the image is pushed as
# <repo><suffix>:<sha> and <repo><suffix>:latest, built from <context> using
# <dockerfile>. Prefer context "." (repo root) with the dockerfile path from the
# root, e.g. "runner/Dockerfile" — `docker build --file <dockerfile> <context>`
# resolves the dockerfile path relative to the checkout root, not the context.

on:
  workflow_call:
    inputs:
      extra_images:
        description: 'JSON array of extra images to build: [{"suffix","dockerfile","context"}]'
        type: string
        required: false
        default: '[]'
      image_retention_count:
        description: 'How many of the newest tagged images to keep per ACR repository during post-deploy cleanup'
        type: number
        required: false
        default: 5

permissions:
  id-token: write
  contents: read

jobs:
  # Derive the resource group / app name and discover this repo's own ACR once;
  # every other job consumes these outputs.
  setup:
    runs-on: ubuntu-latest
    outputs:
      resourceGroup: ${{ steps.derive.outputs.resourceGroup }}
      containerAppName: ${{ steps.derive.outputs.containerAppName }}
      acrName: ${{ steps.derive.outputs.acrName }}
      acrLoginServer: ${{ steps.derive.outputs.acrLoginServer }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Derive names and discover ACR
        id: derive
        shell: bash
        run: |
          set -euo pipefail

          RESOURCE_GROUP='${{ vars.RESOURCE_GROUP }}'
          if [ -z "$RESOURCE_GROUP" ]; then
            RESOURCE_GROUP="rg-${{ github.event.repository.name }}"
          fi
          # appName defaults to the repo name (sanitized) unless parameters.json overrides.
          APP_NAME=$(jq -r '.parameters.appName.value // "app"' infra/main.parameters.json)
          if [ -z "$APP_NAME" ] || [ "$APP_NAME" = "null" ] || [ "$APP_NAME" = "app" ]; then
            APP_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/--*/-/g; s/^-//; s/-$//' | cut -c1-28 | sed 's/-$//')
          fi
          CONTAINER_APP_NAME="ca-${APP_NAME}"

          # This repo has exactly one ACR (its own, in this resource group),
          # created by deploy-infra. Discover it rather than relying on repo vars.
          ACR_NAME=$(az acr list -g "$RESOURCE_GROUP" --query "[0].name" -o tsv)
          ACR_LOGIN_SERVER=$(az acr list -g "$RESOURCE_GROUP" --query "[0].loginServer" -o tsv)
          if [ -z "$ACR_NAME" ] || [ "$ACR_NAME" = "null" ]; then
            echo "::error::No ACR found in '$RESOURCE_GROUP'. Run Deploy Infrastructure first."
            exit 1
          fi

          echo "resourceGroup=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "containerAppName=$CONTAINER_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "acrName=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acrLoginServer=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

  # Keep Docker Hub base images cached in the repo's own ACR. The runner's
  # `docker build` pulls base images from Docker Hub anonymously, which from
  # shared CI egress IPs intermittently 429s (toomanyrequests) and fails builds.
  # Pulling them through the ACR cache (authenticated) instead dodges that.
  # Convention: a
  # Dockerfile opts in by declaring `ARG ACR_LOGIN_SERVER=docker.io` and using
  # `FROM ${ACR_LOGIN_SERVER}/<path>:<tag>` (local builds fall back to Docker
  # Hub). This job scans the repo's Dockerfiles for those references and lazily
  # imports each into the ACR — only when missing or older than a week, so
  # Docker Hub is touched at most ~once a week per tag. Azure blocks anonymous
  # Docker Hub *cache rules* (EnforceCacheRuleAuthentication), hence import.
  # Repos with no such FROM lines: fast no-op.
  prime-base-images:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Scan Dockerfiles for ACR-cached base images
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          refs=$(grep -rhoE '^FROM \$\{ACR_LOGIN_SERVER\}/[^ ]+' --include='Dockerfile*' --include='*.Dockerfile' . 2>/dev/null \
            | sed 's|^FROM ${ACR_LOGIN_SERVER}/||' | sort -u || true)
          echo "refs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$refs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$refs" ]; then echo "Found base-image refs:"; echo "$refs"; else echo "No ACR-cached base images referenced — nothing to prime."; fi

      - name: Azure Login
        if: ${{ steps.scan.outputs.refs != '' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh stale base images (> 1 week) from Docker Hub
        if: ${{ steps.scan.outputs.refs != '' }}
        shell: bash
        env:
          ACR_NAME: ${{ needs.setup.outputs.acrName }}
          REFS: ${{ steps.scan.outputs.refs }}
        run: |
          set -euo pipefail
          MAX_AGE_DAYS=7
          # Import with retries: anonymous Docker Hub pulls 429 under the shared
          # egress IP. A throttled REFRESH of an already-cached image keeps the
          # stale copy (non-fatal); missing + throttled is fatal (FROM would 404).
          import_ref() {
            local ref="$1" had_copy="$2" n=0
            until az acr import -n "$ACR_NAME" --source "docker.io/${ref}" -t "$ref" --force; do
              n=$((n + 1))
              if [ "$n" -ge 6 ]; then
                if [ "$had_copy" = 1 ]; then
                  echo "::warning::Could not refresh ${ref} (Docker Hub throttling); keeping the cached copy."
                  return 0
                fi
                echo "::error::${ref} is not cached and Docker Hub keeps throttling. Re-run shortly; once seeded it won't pull again for a week."
                return 1
              fi
              echo "import attempt ${n} for ${ref} failed (likely 429); retrying in 60s…"
              sleep 60
            done
            echo "Imported ${ref}."
          }
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            updated=$(az acr repository show -n "$ACR_NAME" --image "$ref" --query lastUpdateTime -o tsv 2>/dev/null || true)
            had_copy=0; stale=1
            if [ -n "$updated" ]; then
              had_copy=1
              if epoch=$(date -u -d "${updated%.*}Z" +%s 2>/dev/null); then
                age=$(( ( $(date -u +%s) - epoch ) / 86400 ))
                echo "${ref} is ${age}d old in ${ACR_NAME}"
                if [ "$age" -lt "$MAX_AGE_DAYS" ]; then stale=0; fi
              fi
            else
              echo "${ref} not cached in ${ACR_NAME} yet"
            fi
            if [ "$stale" = 1 ]; then import_ref "$ref" "$had_copy"; else echo "Fresh enough — no Docker Hub hit for ${ref}."; fi
          done <<< "$REFS"

  # Build + push the primary app image on the runner (Docker preinstalled on
  # ubuntu-latest).
  build-app:
    needs: [setup, prime-base-images]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push app image
        shell: bash
        env:
          ACR_NAME: ${{ needs.setup.outputs.acrName }}
          LOGIN: ${{ needs.setup.outputs.acrLoginServer }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # az acr login authenticates Docker to this repo's ACR — both to push
          # the result and to pull any base image referenced through the ACR
          # cache (FROM ${ACR_LOGIN_SERVER}/...). The Owner-on-its-RG SP that runs
          # this has ACR push/pull rights, so no extra role assignment is needed.
          # ACR_LOGIN_SERVER lets a Dockerfile use that cache to dodge Docker
          # Hub's anonymous pull-rate limit; Dockerfiles that don't declare the
          # ARG simply ignore it (BuildKit warns, build still succeeds).
          # --platform linux/amd64: Container Apps run amd64 (ubuntu-latest is
          # already amd64, so this is a no-op match, not emulation).
          az acr login --name "$ACR_NAME"
          docker build \
            --platform linux/amd64 \
            --build-arg ACR_LOGIN_SERVER="$LOGIN" \
            --tag "${LOGIN}/${REPO}:${SHA}" \
            --tag "${LOGIN}/${REPO}:latest" \
            --file Dockerfile .
          docker push "${LOGIN}/${REPO}:${SHA}"
          docker push "${LOGIN}/${REPO}:latest"

  # Build + push any extra images (e.g. a per-session runner image), one parallel
  # job per entry. Skipped entirely when the caller passes no extra_images.
  build-extra:
    needs: [setup, prime-base-images]
    if: ${{ inputs.extra_images != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJSON(inputs.extra_images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push extra image
        shell: bash
        env:
          ACR_NAME: ${{ needs.setup.outputs.acrName }}
          LOGIN: ${{ needs.setup.outputs.acrLoginServer }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
          SUFFIX: ${{ matrix.image.suffix }}
          DOCKERFILE: ${{ matrix.image.dockerfile }}
          CONTEXT: ${{ matrix.image.context }}
        run: |
          set -euo pipefail
          # See build-app: az acr login authenticates Docker to this repo's ACR
          # for push and ACR-cached base-image pulls; ACR_LOGIN_SERVER lets a
          # Dockerfile use that cache (ignored by Dockerfiles that don't).
          az acr login --name "$ACR_NAME"
          docker build \
            --platform linux/amd64 \
            --build-arg ACR_LOGIN_SERVER="$LOGIN" \
            --tag "${LOGIN}/${REPO}${SUFFIX}:${SHA}" \
            --tag "${LOGIN}/${REPO}${SUFFIX}:latest" \
            --file "$DOCKERFILE" \
            "$CONTEXT"
          docker push "${LOGIN}/${REPO}${SUFFIX}:${SHA}"
          docker push "${LOGIN}/${REPO}${SUFFIX}:latest"

  # Point the Container App at the freshly built app image. Runs once all builds
  # are done; tolerates build-extra being skipped (no extra images).
  deploy:
    needs: [setup, build-app, build-extra]
    if: ${{ always() && needs.build-app.result == 'success' && (needs.build-extra.result == 'success' || needs.build-extra.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        shell: bash
        run: |
          set -euo pipefail
          REPO='${{ github.event.repository.name }}'
          IMAGE='${{ needs.setup.outputs.acrLoginServer }}/'"${REPO}:${{ github.sha }}"
          echo "Updating ${{ needs.setup.outputs.containerAppName }} with image $IMAGE"
          az containerapp update \
            --name '${{ needs.setup.outputs.containerAppName }}' \
            --resource-group '${{ needs.setup.outputs.resourceGroup }}' \
            --image "$IMAGE" \
            --only-show-errors

  # Post-deploy registry cleanup. Each deploy pushes <repo>:<sha> (+ extra
  # images) and the weekly base-image refresh leaves untagged manifests behind;
  # nothing else ever deletes, so a Basic ACR (10 GiB included) grows past its
  # quota into per-GiB overage. This job deletes stale manifests while NEVER
  # touching anything that could still be pulled:
  #   keep — any digest referenced by an active Container App revision, an ACI
  #          container group, or a Container Apps job in this resource group
  #          (scale-to-zero apps and ACI sessions re-pull on start, so an
  #          in-use tag must keep resolving);
  #        — the `latest` tag (ACI sessions are launched from it);
  #        — the newest <image_retention_count> tagged manifests per repository
  #          (rollback window);
  #        — any manifest carrying a tag that is not a 40-hex git sha (human
  #          tags like v1, base-image tags like 26-bookworm-slim);
  #        — children of any kept multi-arch index (deleting an index's
  #          untagged platform children corrupts the cached base image);
  #        — anything updated in the last 24 h (races with concurrent builds).
  # If listing in-use images fails, the job aborts BEFORE deleting anything.
  # continue-on-error: a cleanup hiccup must not mark a successful deploy red.
  cleanup:
    needs: [setup, deploy]
    # Explicit condition (like deploy's): with build-extra legitimately skipped,
    # the implicit success() sees a skipped job in the transitive needs chain
    # and would skip this job too.
    if: ${{ always() && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete stale images (keeping anything in use)
        shell: bash
        env:
          ACR: ${{ needs.setup.outputs.acrName }}
          LOGIN: ${{ needs.setup.outputs.acrLoginServer }}
          RG: ${{ needs.setup.outputs.resourceGroup }}
          KEEP: ${{ inputs.image_retention_count }}
        run: |
          set -euo pipefail

          before=$(az acr show-usage -n "$ACR" --query "value[?name=='Size'].currentValue | [0]" -o tsv)

          # 1. Image refs in use anywhere in this resource group. set -e: if
          #    any of these queries fails we abort here, deleting nothing.
          inuse_refs=$(
            for app in $(az containerapp list -g "$RG" --query "[].name" -o tsv); do
              az containerapp revision list -n "$app" -g "$RG" \
                --query "[?properties.active][].properties.template.containers[].image" -o tsv
              az containerapp revision list -n "$app" -g "$RG" \
                --query "[?properties.active][].properties.template.initContainers[].image" -o tsv
            done
            az container list -g "$RG" --query "[].containers[].image" -o tsv
            az containerapp job list -g "$RG" --query "[].properties.template.containers[].image" -o tsv
          )
          inuse_refs=$(echo "$inuse_refs" | grep "^${LOGIN}/" | sed "s|^${LOGIN}/||" | sort -u || true)
          echo "In-use image refs in this registry:"
          echo "$inuse_refs" | sed 's/^/  /'

          cutoff=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%S)
          deleted=0

          for repo in $(az acr repository list -n "$ACR" -o tsv); do
            echo "=== repository: $repo"
            # time_desc so the newest-N slice below is correct; if a registry
            # ever exceeds --top, the unseen tail is simply not deleted yet.
            meta=$(az acr manifest list-metadata -r "$ACR" -n "$repo" \
              --orderby time_desc --top 1000 -o json --only-show-errors)

            inuse_tags=$(echo "$inuse_refs" | awk -F'[:@]' -v r="$repo" '$1==r && $0 ~ /:/ {split($0,a,":"); print a[2]}' | sed 's/@.*//' || true)
            inuse_digests=$(echo "$inuse_refs" | grep "^${repo}@" | sed 's/.*@//' || true)

            keep=$(echo "$meta" | jq -r --arg cutoff "$cutoff" --argjson keep "$KEEP" \
              --arg inuse_tags "$inuse_tags" --arg inuse_digests "$inuse_digests" '
              ($inuse_tags    | split("\n") | map(select(length>0))) as $itags |
              ($inuse_digests | split("\n") | map(select(length>0))) as $idigs |
              [ .[] | select(
                  ((.tags // []) | any(. == "latest")) or
                  ((.tags // []) | any(test("^[0-9a-f]{40}$") | not)) or
                  ((.tags // []) | any(. as $t | $itags | index($t))) or
                  (.digest as $d | $idigs | index($d)) or
                  ((.lastUpdateTime[0:19]) > $cutoff)
                ) | .digest ] +
              [ [ .[] | select((.tags // []) | length > 0) ] | .[0:$keep][] | .digest ]
              | unique | .[]')

            # Children of kept multi-arch indexes are kept too.
            for d in $keep; do
              mt=$(echo "$meta" | jq -r --arg d "$d" '.[] | select(.digest==$d) | .mediaType')
              case "$mt" in
                *image.index*|*manifest.list*)
                  kids=$(az acr manifest show -r "$ACR" -n "${repo}@${d}" -o json --only-show-errors | jq -r '.manifests[].digest')
                  keep=$(printf '%s\n%s\n' "$keep" "$kids" | sort -u)
                  ;;
              esac
            done

            all=$(echo "$meta" | jq -r '.[].digest')
            for d in $(comm -23 <(echo "$all" | sort -u) <(echo "$keep" | sort -u)); do
              tags=$(echo "$meta" | jq -r --arg d "$d" '.[] | select(.digest==$d) | (.tags // []) | join(",")')
              echo "deleting ${repo}@${d} tags=[${tags}]"
              if az acr repository delete -n "$ACR" --image "${repo}@${d}" --yes --only-show-errors; then
                deleted=$((deleted+1))
              else
                echo "::warning::Failed to delete ${repo}@${d}; leaving it for the next run."
              fi
            done
          done

          after=$(az acr show-usage -n "$ACR" --query "value[?name=='Size'].currentValue | [0]" -o tsv)
          echo "Deleted $deleted stale manifest(s). Registry usage: $((before/1024/1024)) MiB -> $((after/1024/1024)) MiB (usage metric can lag a few minutes)."
