name: Container App — Deploy App (reusable)

# Reusable app-deploy workflow for every container-app repo. Builds the app image
# (and any extra images, e.g. a sidecar/runner image) with `az acr build` — the
# build runs inside ACR in the cloud, so the GitHub runner needs no Docker daemon
# and the build runs next to the registry. Then it points the Container App at the
# freshly built image.
#
# Thin caller (app image only):
#   jobs:
#     deploy:
#       uses: KennethHeine/Azure-infrastructure/.github/workflows/container-app-deploy-app.yml@main
#       secrets: inherit
#
# Caller that also builds extra images (each built as a separate parallel job):
#   jobs:
#     deploy:
#       uses: KennethHeine/Azure-infrastructure/.github/workflows/container-app-deploy-app.yml@main
#       secrets: inherit
#       with:
#         extra_images: '[{"suffix":"-runner","dockerfile":"runner/Dockerfile","context":"."}]'
#
# extra_images is a JSON array; for each entry the image is pushed as
# <repo><suffix>:<sha> and <repo><suffix>:latest, built from <context> using
# <dockerfile> (dockerfile path is relative to context). Prefer context "." (repo
# root) with the dockerfile path from the root, e.g. "runner/Dockerfile" — az acr
# build resolves --file against the source root, so a subdir context can pick up
# the wrong Dockerfile.

on:
  workflow_call:
    inputs:
      extra_images:
        description: 'JSON array of extra images to build: [{"suffix","dockerfile","context"}]'
        type: string
        required: false
        default: '[]'

permissions:
  id-token: write
  contents: read

jobs:
  # Derive the resource group / app name and discover this repo's own ACR once;
  # every other job consumes these outputs.
  setup:
    runs-on: ubuntu-latest
    outputs:
      resourceGroup: ${{ steps.derive.outputs.resourceGroup }}
      containerAppName: ${{ steps.derive.outputs.containerAppName }}
      acrName: ${{ steps.derive.outputs.acrName }}
      acrLoginServer: ${{ steps.derive.outputs.acrLoginServer }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Derive names and discover ACR
        id: derive
        shell: bash
        run: |
          set -euo pipefail

          RESOURCE_GROUP='${{ vars.RESOURCE_GROUP }}'
          if [ -z "$RESOURCE_GROUP" ]; then
            RESOURCE_GROUP="rg-${{ github.event.repository.name }}"
          fi
          # appName defaults to the repo name (sanitized) unless parameters.json overrides.
          APP_NAME=$(jq -r '.parameters.appName.value // "app"' infra/main.parameters.json)
          if [ -z "$APP_NAME" ] || [ "$APP_NAME" = "null" ] || [ "$APP_NAME" = "app" ]; then
            APP_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/--*/-/g; s/^-//; s/-$//' | cut -c1-28 | sed 's/-$//')
          fi
          CONTAINER_APP_NAME="ca-${APP_NAME}"

          # This repo has exactly one ACR (its own, in this resource group),
          # created by deploy-infra. Discover it rather than relying on repo vars.
          ACR_NAME=$(az acr list -g "$RESOURCE_GROUP" --query "[0].name" -o tsv)
          ACR_LOGIN_SERVER=$(az acr list -g "$RESOURCE_GROUP" --query "[0].loginServer" -o tsv)
          if [ -z "$ACR_NAME" ] || [ "$ACR_NAME" = "null" ]; then
            echo "::error::No ACR found in '$RESOURCE_GROUP'. Run Deploy Infrastructure first."
            exit 1
          fi

          echo "resourceGroup=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "containerAppName=$CONTAINER_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "acrName=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acrLoginServer=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

  # Keep Docker Hub base images cached in the repo's own ACR. `az acr build`
  # agents pull from Docker Hub anonymously via a shared egress IP, which
  # intermittently 429s (toomanyrequests) and fails builds. Convention: a
  # Dockerfile opts in by declaring `ARG ACR_LOGIN_SERVER=docker.io` and using
  # `FROM ${ACR_LOGIN_SERVER}/<path>:<tag>` (local builds fall back to Docker
  # Hub). This job scans the repo's Dockerfiles for those references and lazily
  # imports each into the ACR — only when missing or older than a week, so
  # Docker Hub is touched at most ~once a week per tag. Azure blocks anonymous
  # Docker Hub *cache rules* (EnforceCacheRuleAuthentication), hence import.
  # Repos with no such FROM lines: fast no-op.
  prime-base-images:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Scan Dockerfiles for ACR-cached base images
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          refs=$(grep -rhoE '^FROM \$\{ACR_LOGIN_SERVER\}/[^ ]+' --include='Dockerfile*' --include='*.Dockerfile' . 2>/dev/null \
            | sed 's|^FROM ${ACR_LOGIN_SERVER}/||' | sort -u || true)
          echo "refs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$refs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$refs" ]; then echo "Found base-image refs:"; echo "$refs"; else echo "No ACR-cached base images referenced — nothing to prime."; fi

      - name: Azure Login
        if: ${{ steps.scan.outputs.refs != '' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh stale base images (> 1 week) from Docker Hub
        if: ${{ steps.scan.outputs.refs != '' }}
        shell: bash
        env:
          ACR_NAME: ${{ needs.setup.outputs.acrName }}
          REFS: ${{ steps.scan.outputs.refs }}
        run: |
          set -euo pipefail
          MAX_AGE_DAYS=7
          # Import with retries: anonymous Docker Hub pulls 429 under the shared
          # egress IP. A throttled REFRESH of an already-cached image keeps the
          # stale copy (non-fatal); missing + throttled is fatal (FROM would 404).
          import_ref() {
            local ref="$1" had_copy="$2" n=0
            until az acr import -n "$ACR_NAME" --source "docker.io/${ref}" -t "$ref" --force; do
              n=$((n + 1))
              if [ "$n" -ge 6 ]; then
                if [ "$had_copy" = 1 ]; then
                  echo "::warning::Could not refresh ${ref} (Docker Hub throttling); keeping the cached copy."
                  return 0
                fi
                echo "::error::${ref} is not cached and Docker Hub keeps throttling. Re-run shortly; once seeded it won't pull again for a week."
                return 1
              fi
              echo "import attempt ${n} for ${ref} failed (likely 429); retrying in 60s…"
              sleep 60
            done
            echo "Imported ${ref}."
          }
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            updated=$(az acr repository show -n "$ACR_NAME" --image "$ref" --query lastUpdateTime -o tsv 2>/dev/null || true)
            had_copy=0; stale=1
            if [ -n "$updated" ]; then
              had_copy=1
              if epoch=$(date -u -d "${updated%.*}Z" +%s 2>/dev/null); then
                age=$(( ( $(date -u +%s) - epoch ) / 86400 ))
                echo "${ref} is ${age}d old in ${ACR_NAME}"
                if [ "$age" -lt "$MAX_AGE_DAYS" ]; then stale=0; fi
              fi
            else
              echo "${ref} not cached in ${ACR_NAME} yet"
            fi
            if [ "$stale" = 1 ]; then import_ref "$ref" "$had_copy"; else echo "Fresh enough — no Docker Hub hit for ${ref}."; fi
          done <<< "$REFS"

  # Build + push the primary app image (cloud build in ACR).
  build-app:
    needs: [setup, prime-base-images]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build app image
        shell: bash
        run: |
          set -euo pipefail
          REPO='${{ github.event.repository.name }}'
          # Expose this repo's ACR login server so a Dockerfile can pull base
          # images through an ACR pull-through cache (avoids Docker Hub's
          # anonymous pull-rate limit). Dockerfiles that don't declare the
          # ARG simply ignore it (BuildKit warns, build still succeeds).
          az acr build \
            --registry '${{ needs.setup.outputs.acrName }}' \
            --build-arg ACR_LOGIN_SERVER='${{ needs.setup.outputs.acrLoginServer }}' \
            --image "${REPO}:${{ github.sha }}" \
            --image "${REPO}:latest" \
            --file Dockerfile .

  # Build + push any extra images (e.g. a per-session runner image), one parallel
  # job per entry. Skipped entirely when the caller passes no extra_images.
  build-extra:
    needs: [setup, prime-base-images]
    if: ${{ inputs.extra_images != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJSON(inputs.extra_images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build extra image
        shell: bash
        run: |
          set -euo pipefail
          REPO='${{ github.event.repository.name }}'
          SUFFIX='${{ matrix.image.suffix }}'
          # See build-app: ACR_LOGIN_SERVER lets a Dockerfile cache base images
          # through this repo's ACR; ignored by Dockerfiles that don't use it.
          az acr build \
            --registry '${{ needs.setup.outputs.acrName }}' \
            --build-arg ACR_LOGIN_SERVER='${{ needs.setup.outputs.acrLoginServer }}' \
            --image "${REPO}${SUFFIX}:${{ github.sha }}" \
            --image "${REPO}${SUFFIX}:latest" \
            --file '${{ matrix.image.dockerfile }}' \
            '${{ matrix.image.context }}'

  # Point the Container App at the freshly built app image. Runs once all builds
  # are done; tolerates build-extra being skipped (no extra images).
  deploy:
    needs: [setup, build-app, build-extra]
    if: ${{ always() && needs.build-app.result == 'success' && (needs.build-extra.result == 'success' || needs.build-extra.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        shell: bash
        run: |
          set -euo pipefail
          REPO='${{ github.event.repository.name }}'
          IMAGE='${{ needs.setup.outputs.acrLoginServer }}/'"${REPO}:${{ github.sha }}"
          echo "Updating ${{ needs.setup.outputs.containerAppName }} with image $IMAGE"
          az containerapp update \
            --name '${{ needs.setup.outputs.containerAppName }}' \
            --resource-group '${{ needs.setup.outputs.resourceGroup }}' \
            --image "$IMAGE" \
            --only-show-errors
