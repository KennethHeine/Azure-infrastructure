name: Deploy claude-runner app image (temp)

# Temporary one-off unblock: point ca-claude-runner at its already-built portal
# image. The normal path (claude-runner's own deploy-app) is blocked because the
# account's PRIVATE-repo GitHub Actions minutes are exhausted — private-repo jobs
# fail to start (2s, no runner, no steps), while this PUBLIC control-plane repo
# has free unlimited Actions. Runs as the central onboarding SP (subscription
# Owner), which can update any RG's container app. The image was already built +
# pushed by the (successful) build jobs and gated by green CI. Delete this file
# after use; this is NOT the steady-state deploy path.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Image tag (git sha) of claude-runner:<sha> in its ACR'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update ca-claude-runner to the built image
        uses: azure/cli@v2
        env:
          SHA: ${{ inputs.sha }}
        with:
          inlineScript: |
            set -euo pipefail
            RG="rg-claude-runner"
            APP="ca-claude-runner"
            ACR=$(az acr list -g "$RG" --query "[0].name" -o tsv)
            LOGIN=$(az acr list -g "$RG" --query "[0].loginServer" -o tsv)
            echo "ACR: $ACR ($LOGIN)"
            # Resolve the image tag: prefer the requested sha, else fall back to
            # the most recently-pushed tag on the claude-runner repository.
            if az acr repository show-tags -n "$ACR" --repository claude-runner -o tsv 2>/dev/null | grep -qx "$SHA"; then
              TAG="$SHA"
            else
              echo "::warning::tag $SHA not found in ACR; falling back to most recent claude-runner tag"
              TAG=$(az acr repository show-tags -n "$ACR" --repository claude-runner --orderby time_desc --top 1 -o tsv)
            fi
            IMAGE="${LOGIN}/claude-runner:${TAG}"
            echo "Deploying image: $IMAGE"
            az containerapp update --name "$APP" --resource-group "$RG" \
              --image "$IMAGE" --only-show-errors
            echo "=== active revision + fqdn ==="
            az containerapp show -n "$APP" -g "$RG" \
              --query "{fqdn:properties.configuration.ingress.fqdn, image:properties.template.containers[0].image, latestRevision:properties.latestRevisionName, running:properties.runningStatus}" -o json
