name: Deploy DNS Zone

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths: ['dns/**']

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-dns
  LOCATION: swedencentral

jobs:
  deploy:
    name: Deploy DNS zone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy with the runner's preinstalled az CLI (already authenticated by the
      # OIDC login above) instead of azure/arm-deploy@v2, which still runs on the
      # deprecated Node 20 runtime and has no newer major release.
      - name: Deploy DNS Bicep
        shell: bash
        run: |
          set -euo pipefail
          # Create the DNS resource group if it doesn't exist (the zone itself is
          # global; the RG just needs a location). Follows the rg-<purpose> naming.
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --only-show-errors >/dev/null
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "dns-${{ github.run_number }}" \
            --template-file ./dns/main.bicep \
            --only-show-errors
