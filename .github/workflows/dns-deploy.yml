name: Deploy DNS Zone

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths: ['dns/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy DNS zone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy DNS Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: kscloud
          template: ./dns/main.bicep
          deploymentName: dns-${{ github.run_number }}
          failOnStdErr: false
