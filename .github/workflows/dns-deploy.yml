name: Deploy DNS Zone

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths: ['dns/**']

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-dns
  LOCATION: swedencentral

jobs:
  deploy:
    name: Deploy DNS zone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy with the runner's preinstalled az CLI (already authenticated by the
      # OIDC login above) instead of azure/arm-deploy@v2, which still runs on the
      # deprecated Node 20 runtime and has no newer major release.
      - name: Deploy DNS Bicep
        shell: bash
        run: |
          set -euo pipefail
          # Create the DNS resource group if it doesn't exist (the zone itself is
          # global; the RG just needs a location). Follows the rg-<purpose> naming.
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --only-show-errors >/dev/null
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "dns-${{ github.run_number }}" \
            --template-file ./dns/main.bicep \
            --only-show-errors

      - name: Reconcile (prune records in neither record file)
        shell: bash
        run: |
          set -euo pipefail
          # ARM incremental deployments add/update records but NEVER delete records
          # dropped from the template. This step makes the UNION of the two source
          # files (records.platform.json + records.app.json) fully authoritative:
          # any record set in the zone that is in neither file is deleted. The
          # Azure-managed apex SOA and NS records are always preserved. Records
          # added directly in the portal (i.e. in neither file) will be pruned
          # here — keep the two record files the source of truth.
          ZONE=$(jq -r '.zoneName' dns/records.platform.json)
          desired=$(jq -r '.records[] | "\(.type) \(.name)"' dns/records.platform.json dns/records.app.json | sort -u)
          echo "Desired record sets:"; echo "$desired" | sed 's/^/  /'

          az network dns record-set list -g "$RESOURCE_GROUP" -z "$ZONE" \
            --query "[].{type:type, name:name}" -o tsv |
          while IFS=$'\t' read -r fqtype rsname; do
            rtype="${fqtype##*/}"                 # Microsoft.Network/dnszones/CNAME -> CNAME
            rtype_uc=$(echo "$rtype" | tr '[:lower:]' '[:upper:]')
            # Never touch the zone's Azure-managed apex SOA / NS records.
            if [ "$rtype_uc" = "SOA" ]; then continue; fi
            if [ "$rtype_uc" = "NS" ] && [ "$rsname" = "@" ]; then continue; fi
            if grep -qxF "$rtype_uc $rsname" <<< "$desired"; then continue; fi
            echo "Pruning $rtype_uc record '$rsname' (in neither record file)"
            az network dns record-set "$(echo "$rtype_uc" | tr '[:upper:]' '[:lower:]')" delete \
              -g "$RESOURCE_GROUP" -z "$ZONE" -n "$rsname" --yes --only-show-errors
          done
          echo "Reconcile complete."
