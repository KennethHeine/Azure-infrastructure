name: Container App — Deploy Infrastructure (reusable)

# Reusable infrastructure-deploy workflow for every container-app repo. Each repo
# keeps only a thin caller that does:
#
#   jobs:
#     deploy:
#       uses: KennethHeine/Azure-infrastructure/.github/workflows/container-app-deploy-infra.yml@main
#       secrets: inherit
#
# The caller's repo context (vars.RESOURCE_GROUP, the AZURE_* secrets, the repo
# name, infra/main.bicep + infra/main.parameters.json) is what this workflow acts
# on. The Bicep contract this expects from each repo's infra/main.bicep:
#   * params:  appName (string), image (string), bindCustomDomain (bool)
#   * outputs: containerAppName, containerAppFqdn, authEnabled, authAppClientId,
#              authAppUserImpersonationScopeId, azureCliClientId

on:
  workflow_call:
    inputs:
      preview:
        description: 'Enable per-branch preview routing: on a non-main ref, deploy as the preview SP (secrets.AZURE_CLIENT_ID_PREVIEW) into vars.RESOURCE_GROUP_PREVIEW instead of prod. Default false (every existing caller is unchanged).'
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # On a non-main ref with preview enabled, assume the preview SP (Owner of the
    # preview RG only) — it can never touch prod. main, and every non-preview
    # caller, keep using the prod SP. Secrets can't be job outputs, so the
    # selection is an inline ternary at each azure/login.
    env:
      IS_PREVIEW: ${{ inputs.preview && github.ref != 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ (inputs.preview && github.ref != 'refs/heads/main') && secrets.AZURE_CLIENT_ID_PREVIEW || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # The ACR, the pull identity (id-<appName>), its AcrPull grant, and any
      # repo-specific role assignments are all created declaratively in
      # infra/main.bicep — they live in this repo's own resource group, where the
      # SP is Owner, so no imperative RBAC pre-step is needed here.
      - name: Deploy Bicep
        id: deploy
        uses: azure/cli@v2
        env:
          ENABLE_AUTH_VAR: ${{ vars.ENABLE_AUTH }}
          IS_PREVIEW: ${{ inputs.preview && github.ref != 'refs/heads/main' }}
          RG_PROD: ${{ vars.RESOURCE_GROUP }}
          RG_PREVIEW: ${{ vars.RESOURCE_GROUP_PREVIEW }}
        with:
          inlineScript: |
            set -euo pipefail

            # Preview: deploy into the isolated preview RG (the SP we logged in as
            # is Owner of only that RG). Otherwise prod.
            if [ "${IS_PREVIEW:-false}" = "true" ]; then
              RESOURCE_GROUP="${RG_PREVIEW:-rg-${{ github.event.repository.name }}-preview}"
            else
              RESOURCE_GROUP="${RG_PROD:-rg-${{ github.event.repository.name }}}"
            fi
            # appName defaults to the repo name (sanitized) unless parameters.json overrides.
            APP_NAME=$(jq -r '.parameters.appName.value // "app"' infra/main.parameters.json)
            if [ -z "$APP_NAME" ] || [ "$APP_NAME" = "null" ] || [ "$APP_NAME" = "app" ]; then
              APP_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/--*/-/g; s/^-//; s/-$//' | cut -c1-28 | sed 's/-$//')
            fi
            CONTAINER_APP_NAME="ca-${APP_NAME}"
            DEPLOYMENT_NAME="infra-${GITHUB_RUN_ID}"

            # Idempotent image handling: if the Container App already exists, keep its
            # current image so re-running infra never rolls back to the bootstrap
            # placeholder. On first deploy the app does not exist yet, so we omit the
            # image parameter and let the Bicep default (public placeholder) apply.
            IMAGE_ARGS=()
            currentImage=$(az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.template.containers[0].image" \
              -o tsv 2>/dev/null || true)
            if [ -n "$currentImage" ]; then
              echo "Container App exists; preserving current image: $currentImage"
              IMAGE_ARGS=(image="$currentImage")
            else
              echo "Container App does not exist yet; using Bicep bootstrap placeholder image."
            fi

            # Custom domain: a managed certificate can't be created until the hostname
            # is registered on the app (RequireCustomHostnameInEnvironment). So if the
            # app already exists and a custom domain is configured, register the
            # hostname (unbound) here, then tell Bicep to create the cert and switch
            # the binding to SNI. On the first-ever deploy the app doesn't exist yet,
            # so binding is skipped this run and completed on the next deploy. Repos
            # with no customDomain in parameters.json always get bindCustomDomain=false.
            # Preview never touches the prod custom domain: force it empty and
            # override the parameters.json value so Bicep configures no hostname
            # (preview is reached on its own default Container App FQDN).
            DOMAIN_ARGS=()
            if [ "${IS_PREVIEW:-false}" = "true" ]; then
              CUSTOM_DOMAIN=""
              DOMAIN_ARGS=(customDomain="")
            else
              CUSTOM_DOMAIN=$(jq -r '.parameters.customDomain.value // ""' infra/main.parameters.json)
            fi
            BIND_ARGS=(bindCustomDomain=false)
            if [ -n "$CUSTOM_DOMAIN" ] && [ "$CUSTOM_DOMAIN" != "null" ] && [ -n "$currentImage" ]; then
              if az containerapp hostname list --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" \
                   --query "[?name=='${CUSTOM_DOMAIN}']" -o tsv 2>/dev/null | grep -q .; then
                echo "Custom hostname $CUSTOM_DOMAIN already registered on $CONTAINER_APP_NAME."
              else
                echo "Registering custom hostname $CUSTOM_DOMAIN on $CONTAINER_APP_NAME (unbound)."
                az containerapp hostname add --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" \
                  --hostname "$CUSTOM_DOMAIN" --only-show-errors
              fi
              BIND_ARGS=(bindCustomDomain=true)
            fi

            # Easy Auth: onboarding records the repo's auth choice in the
            # ENABLE_AUTH repo VARIABLE, but Bicep reads enableAuth from
            # parameters.json (which ships as true from the template) — so a
            # repo onboarded with auth=false silently deployed WITH auth unless
            # someone also edited parameters.json. Honor the variable here as an
            # explicit override; strictly validated, and repos without the
            # variable keep parameters.json behavior unchanged.
            AUTH_ARGS=()
            case "${ENABLE_AUTH_VAR:-}" in
              true|false)
                echo "Overriding enableAuth=$ENABLE_AUTH_VAR (from the ENABLE_AUTH repo variable)."
                AUTH_ARGS=(enableAuth="$ENABLE_AUTH_VAR")
                ;;
              '') : ;;  # variable unset — parameters.json decides
              *) echo "::warning::Ignoring non-boolean ENABLE_AUTH variable: '$ENABLE_AUTH_VAR'" ;;
            esac

            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --template-file infra/main.bicep \
              --parameters @infra/main.parameters.json \
                appName="$APP_NAME" \
                "${IMAGE_ARGS[@]}" \
                "${BIND_ARGS[@]}" \
                "${AUTH_ARGS[@]}" \
                "${DOMAIN_ARGS[@]}" \
              --only-show-errors

            get_output() {
              az deployment group show --resource-group "$RESOURCE_GROUP" --name "$DEPLOYMENT_NAME" \
                --query "properties.outputs.$1.value" -o tsv 2>/dev/null || true
            }

            containerAppName=$(get_output containerAppName)
            containerAppFqdn=$(get_output containerAppFqdn)
            authEnabled=$(get_output authEnabled)
            authAppClientId=$(get_output authAppClientId)
            authScopeId=$(get_output authAppUserImpersonationScopeId)
            azureCliClientId=$(get_output azureCliClientId)

            echo "resourceGroup=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
            echo "containerAppName=$containerAppName" >> "$GITHUB_OUTPUT"
            echo "containerAppFqdn=$containerAppFqdn" >> "$GITHUB_OUTPUT"
            echo "authEnabled=$authEnabled" >> "$GITHUB_OUTPUT"
            echo "authAppClientId=$authAppClientId" >> "$GITHUB_OUTPUT"
            echo "authScopeId=$authScopeId" >> "$GITHUB_OUTPUT"
            echo "azureCliClientId=$azureCliClientId" >> "$GITHUB_OUTPUT"

      # Re-authenticate before the post-deploy steps. A long Bicep deploy (e.g.
      # provisioning a managed certificate) can outlast the GitHub OIDC client
      # assertion's ~5-minute validity, after which Graph/ARM token requests fail
      # with AADSTS700024. A fresh login mints a new assertion for the step below.
      - name: Re-authenticate to Azure (post-deploy)
        uses: azure/login@v3
        with:
          client-id: ${{ (inputs.preview && github.ref != 'refs/heads/main') && secrets.AZURE_CLIENT_ID_PREVIEW || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-authorize Azure CLI on the auth app
        if: ${{ steps.deploy.outputs.authEnabled == 'true' && steps.deploy.outputs.authAppClientId != '' }}
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            # The Microsoft Graph Bicep extension cannot set api.preAuthorizedApplications
            # in the same operation that first creates the oauth2PermissionScope (Graph
            # validates the permission id against scopes that don't exist yet). So the
            # scope is created declaratively in Bicep and the Azure CLI pre-authorization
            # is applied here via Graph, idempotently, after the scope exists. This lets
            # `az account get-access-token --scope "<appId>/.default"` mint a user token
            # for the app without an interactive consent prompt.
            APP_ID='${{ steps.deploy.outputs.authAppClientId }}'
            CLI_ID='${{ steps.deploy.outputs.azureCliClientId }}'
            SCOPE_ID='${{ steps.deploy.outputs.authScopeId }}'

            echo "Pre-authorizing Azure CLI ($CLI_ID) for scope $SCOPE_ID on app $APP_ID"
            az rest \
              --method PATCH \
              --url "https://graph.microsoft.com/v1.0/applications(appId='${APP_ID}')" \
              --headers 'Content-Type=application/json' \
              --body "{\"api\":{\"preAuthorizedApplications\":[{\"appId\":\"${CLI_ID}\",\"delegatedPermissionIds\":[\"${SCOPE_ID}\"]}]}}" \
              --only-show-errors
            echo "Azure CLI pre-authorization applied."

      - name: Deployment summary
        run: |
          echo "Resource group: ${{ steps.deploy.outputs.resourceGroup }}"
          echo "Container App:  ${{ steps.deploy.outputs.containerAppName }}"
          echo "Container App URL: https://${{ steps.deploy.outputs.containerAppFqdn }}"
          echo "Auth enabled: ${{ steps.deploy.outputs.authEnabled }}"
          if [ "${{ steps.deploy.outputs.authEnabled }}" = "true" ]; then
            echo "Entra auth application (created by Bicep) client id: ${{ steps.deploy.outputs.authAppClientId }}"
            echo "Built-in auth is configured declaratively in Bicep using the Container App"
            echo "managed identity (federated credential) — no client secret required."
          fi
